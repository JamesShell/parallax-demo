<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Project Demo</title>
</head>

<body>
    <main>
        <!-- Parallax Background Elements -->
        <img src="img/Background.png" data-distance="-200" data-speedx="0.2" data-speedy="0.1" data-speedz="0"
            class="parallax bg-img">
        <canvas id="canv" data-distance="-200" data-speedx="0.2" data-speedy="0.1" data-speedz="0"
            class="parallax"></canvas>
        <img src="img/Building 4.png" data-distance="850" data-speedx="0.27" data-speedy="0.3" data-speedz="0"
            class="parallax mountain-4">
        <div>
        </div>
        <img src="img/Building 3.png" data-distance="1100" data-speedx="0.195" data-speedy="0.15" data-speedz="0.15"
            class="parallax mountain-3">
        <img src="img/Shine_2.png" data-distance="0" data-speedx="0.1" data-speedy="0.15" data-speedz="0"
            class="parallax shine-2">
        <img src="img/Fog_2.png" data-distance="0" data-speedx="0.125" data-speedy="0.15" data-speedz="0"
            class="parallax fog-2">
        <img src="img/Building 2.png" data-distance="0" data-speedx="0.125" data-speedy="0.1" data-speedz="0.1"
            class="parallax mountain-2">
        <img src="img/Fog_1.png" data-distance="0" data-speedx="0.16" data-speedy="0.2" data-speedz="0.05"
            class="parallax fog-1">
        <img src="img/Fog_2.png" data-speedx="0.16" data-speedy="0.2" data-speedz="0.075" class="parallax fog-4">
        <img src="img/Building 5.png" data-speedx="0.1" data-speedy="0.025" data-speedy="0.045" data-speedz="0.175"
            class="parallax mountain-5">
        <img src="img/Building 1.png" data-distance="0" data-speedx="0.125" data-speedy="0.07" data-speedz="0.13"
            class="parallax mountain-1">
        <img src="img/Fog_0.png" data-distance="0" data-speedx="0.075" data-speedy="0.075" data-speedz="0"
            class="parallax fog-0">
        <img src="img/Building 0.png" data-distance="1500" data-speedx="0.025" data-speedy="0.05" data-speedz="0.125"
            class="parallax mountain-0">
        <img src="img/Fog_Water.png" data-distance="1800" data-speedx="0.05" data-speedz="0" class="parallax fog-water">
        <img src="img/Water.png" data-distance="200" data-speedx="0.035" data-speedz="0" class="parallax water">
        <img src="img/Fog_Foreground.png" data-distance="2000" data-speedx="0.0175" data-speedz="0"
            class="parallax fog-fg">
        <img src="img/Foreground.png" data-distance="2100" data-speedx="0.025" data-speedz="0.1"
            class="parallax fg-img-2">
        <div class="falling-leaves parallax" data-speedx="0.03" data-speedz="0.2"></div>
        <img src="img/Foreground.png" data-distance="2200" data-speedx="0.005" data-speedz="0.125"
            class="parallax fg-img">
        <img src="img/Front Fog.png" data-distance="2500" data-speedx="0.075" data-speedz="0" class="parallax fog-img">
        <img src="img/Front Fog.png" data-distance="2700" data-speedx="0.1" data-speedz="0" class="parallax fog-img-2">
        <!-- <div class="vignette"></div> -->

    </main>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.11.0/dist/gsap.min.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
